};
function drawScene(s) {
  ctx.clearRect(0,0,900,460);
  ctx.fillStyle = '#f8fafc'; ctx.fillRect(0,0,900,460);
  const raw = s.raw_state || [0,0,0,0];

  ctx.strokeStyle = '#fca5a5'; ctx.lineWidth = 2;

function computeLayout() {
